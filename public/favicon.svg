<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Logo: grimório mágico com estrela">
  <title>Bruno Santos — Portfólio</title>
  <!-- Fundo circular -->
  <circle cx="50" cy="50" r="48" fill="#0A0B0F" stroke="#7F77DD" stroke-width="2"/>
  <!-- Estrela de seis pontas (grimório) -->
  <polygon points="50,10 58,35 85,35 63,52 71,77 50,60 29,77 37,52 15,35 42,35" fill="none" stroke="#E8A838" stroke-width="2" stroke-linejoin="round"/>
  <!-- Círculo central -->
  <circle cx="50" cy="50" r="8" fill="#7F77DD" opacity="0.8"/>
  <!-- Raio de brilho -->
  <circle cx="50" cy="50" r="4" fill="#E8A838"/>
</svg>